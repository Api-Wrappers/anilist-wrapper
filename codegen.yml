schema: https://graphql.anilist.co
documents:
  - "src/**/*.{ts,tsx}"
  - "!src/__generated__/**"
generates:
  src/__generated__/anilist-schema.ts:
    plugins:
      - typescript
    config:
      useTypeImports: true
      skipTypename: true
      avoidOptionals: true
  src/__generated__/anilist-sdk.ts:
    plugins:
      - ./scripts/codegen-string-documents.mjs
      - typescript-operations
      - typescript-generic-sdk
    config:
      documentMode: string
      rawRequest: false
      useTypeImports: true
      dedupeOperationSuffix: true
      skipTypename: true
      avoidOptionals: true
