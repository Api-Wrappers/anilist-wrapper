name: Bug report
description: Report a reproducible problem in the wrapper.
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction so maintainers can verify the issue.
  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Which version of @api-wrappers/anilist-wrapper are you using?
      placeholder: 2.5.4
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Anime service
        - Manga service
        - Character service
        - Staff service
        - User service
        - Media service
        - Media list service
        - Raw GraphQL
        - Generated types
        - Documentation
        - Build or packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest code sample or repository link that reproduces the issue.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include errors, stack traces, or unexpected response details.
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Bun, Node.js, and TypeScript versions.
      placeholder: Bun 1.3.0, Node.js 24.0.0, TypeScript 5.9.0
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that may help reproduce or debug the issue.
