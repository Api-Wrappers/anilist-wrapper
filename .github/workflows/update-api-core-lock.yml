name: Update api-core lockfile

on:
  push:
    branches:
      - chore/api-core-1.1.0

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: chore/api-core-1.1.0
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Update dependency and lockfile
        run: bun add '@api-wrappers/api-core@^1.1.0'

      - name: Commit generated files
        run: |
          rm .github/workflows/update-api-core-lock.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json bun.lock .github/workflows/update-api-core-lock.yml
          git commit -m 'Update api-core to 1.1.0'
          git push origin HEAD:chore/api-core-1.1.0
