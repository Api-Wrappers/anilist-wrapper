name: Format generic SDK branch

on:
  push:
    branches:
      - agent/generic-sdk-codegen

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: agent/generic-sdk-codegen
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Apply Biome formatting
        run: bun run check:write
      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/format-generic-sdk.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Apply repository formatting'
          git push origin HEAD:agent/generic-sdk-codegen
