name: Generate generic SDK outputs

on:
  push:
    branches:
      - agent/generic-sdk-codegen

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: agent/generic-sdk-codegen
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies and update lockfile
        run: bun install
      - name: Generate SDK
        run: bun run codegen
      - name: Remove obsolete and temporary files
        run: |
          rm scripts/patch-codegen.ts
          rm .github/workflows/generate-generic-sdk.yml
      - name: Commit generated outputs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Regenerate AniList generic SDK'
          git push origin HEAD:agent/generic-sdk-codegen
